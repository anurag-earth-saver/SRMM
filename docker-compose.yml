version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: server.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped
